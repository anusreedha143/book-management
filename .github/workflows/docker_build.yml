# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go
# This will cause the workflow to get triggered on push commits for all branches except main.
name: Docker Image CI

on:
  push:
    branches-ignore:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      # This matrix will run the steps below twice:
      # 1. With service_name = "api"
      # 2. With service_name = "web"
      matrix:
        service_name: [api, web]
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker Image for ${{ matrix.service_name }}
      run: docker build . --file Dockerfile.multistage --build-arg ENTRY_POINT=${{ matrix.service_name }} --tag books-management-${{ matrix.service_name }}:$(date +%s)

    # - name: Test
    #   run: go test -v ./...