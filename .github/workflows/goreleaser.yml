name: go releaser

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - '*'

env:
  REGISTRY: docker.io
  # Base name. We will append -api and -web to this later.
  IMAGE_BASE_NAME: anusreedha143/book-management

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.22 # Updated to a modern stable version

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        if: startsWith(github.ref, 'refs/tags/')
        with:
          version: latest
          args: release --clean # --rm-dist is deprecated, use --clean
        env:
          GITHUB_TOKEN: ${{ secrets.MYGITHUB_TOKEN }}

      # ----------------------------------------------------------------
      # BUILD 1: API SERVICE
      # ----------------------------------------------------------------
      - name: Extract metadata for API
        id: meta-api
        uses: docker/meta-action@v5
        with:
          # Creates anusreedha143/book-management-api
          images: ${{ env.IMAGE_BASE_NAME }}-api
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push API Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.multistage
          push: ${{ github.event_name != 'pull_request' }} # Don't push on PRs
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          # Fix: Passing the required argument
          build-args: |
            ENTRY_POINT=api

      # ----------------------------------------------------------------
      # BUILD 2: WEB SERVICE
      # ----------------------------------------------------------------
      - name: Extract metadata for Web
        id: meta-web
        uses: docker/meta-action@v5
        with:
          # Creates anusreedha143/book-management-web
          images: ${{ env.IMAGE_BASE_NAME }}-web
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push Web Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.multistage
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          # Fix: Passing the required argument
          build-args: |
            ENTRY_POINT=web