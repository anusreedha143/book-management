services:
  postgres_db:
    image: postgres:17-alpine
    container_name: reading-list-db-container
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d 
      # Loads your existing tables
      # read about profiles
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  api:
    build:
      context: .
      dockerfile: Dockerfile.multistage
      args:
        ENTRY_POINT: api
    # If you want to scale your API service, you should remove the container_name field from the api service definition in your docker-compose.yaml file. This will allow Docker Compose to automatically assign unique names to each instance of the API service when you scale it up.
    container_name: books_management_api
    depends_on:
      postgres_db:
        condition: service_healthy
    env_file: .env
    ports:
      - "4000:4000"
    develop:
      watch:
        - action: rebuild
          path: .
          ignore:
            - ui/
            - .git/
            - bin/
    networks:
      - app_network

  web:
    build:
      context: .
      dockerfile: Dockerfile.multistage
      args:
        ENTRY_POINT: web
    container_name: books_management_web_app
    depends_on:
      - api
    env_file: .env
    ports:
      - "8080:8080"
    develop:
      watch:
        - action: sync
          path: ./ui
          target: /app/ui
        - action: rebuild
          path: .
          ignore:
            - ui/
            - .git/
            - bin/
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data: