{{define "title"}}Create a New Book Entry{{end}}

{{define "main"}}
<form action='/book/create' method='Post'>
  <label>Title:</label>
  <input type="text" name="title" required maxlength="150"><br>

  <label>Pages:</label>
  <input type="number" name="pages" required min="1" max="9999"><br>

  <label>Published:</label>
  <input type="number" name="published" required min="1000 " max="9999" step="1"><br>

  <label>Genres:</label>
  <input type="text" name="genres" required><br>

  <label>Rating:</label>
  <input type="number" step="0.1" name="rating" required min="0" max="5"><br>
  
  <div class="button-center">
    <button type="submit">Submit</button>
  </div>
  
</form>
{{end}}
