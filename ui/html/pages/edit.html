{{define "title"}}Edit Book{{end}}

{{define "main"}}
<h1>Edit Book</h1>
<div>
	<form action="/book/edit?id={{.ID}}" method="post">
	<div>
		<label for="title">Title</label>
		<input type="text" name="title" id="title" value="{{.Title}}">
	</div>

	<div>
		<label for="pages">Pages</label>
		<input type="number" name="pages" id="pages" value="{{.Pages}}">
	</div>

	<div>
		<label for="published">Published</label>
		<input type="number" name="published" id="published" value="{{.Published}}">
	</div>

	<div>
		<label for="genres">Genres</label>
		<input type="text" name="genres" id="genres" value="{{join .Genres ", "}}">
	</div>

	<div>
		<label for="rating">Rating</label>
		<input type="number" step="0.1" name="rating" id="rating" value="{{.Rating}}">
	</div>

	<button type="submit">Save Changes</button>
</form>
</div>
{{end}}
